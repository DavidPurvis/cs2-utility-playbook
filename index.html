<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Dust 2 Playbook — scenario-based utility executes for coordinated CS2 squads." />
    <meta name="theme-color" content="#0a0e15" />
    <meta name="color-scheme" content="dark" />
    <meta name="application-name" content="Dust 2 Playbook" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Dust 2 Playbook" />
    <meta property="og:description" content="Scenario-based utility executes for coordinated CS2 squads." />
    <meta property="og:image" content="/cs2-utility-playbook/og-image.png" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.png" type="image/png" sizes="32x32" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Dust 2 Playbook</title>
    <style>
      html, body, #root { margin: 0; padding: 0; background: #0a0e15; min-height: 100vh; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #e6ebf2;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      * { box-sizing: border-box; }
      .noscript-banner {
        padding: 16px;
        background: #1a1010;
        border-bottom: 1px solid #ef5969;
        color: #ff8899;
        text-align: center;
        font-size: 14px;
      }

      /* ── Responsive layout ────────────────────────────────────────── */
      /* Mobile-first defaults: stack the radar above the side panel,
         and collapse scenario role columns to one per row. */
      .d2-main {
        grid-template-columns: minmax(0, 1fr) !important;
      }
      .scenario-roles {
        grid-template-columns: minmax(0, 1fr) !important;
      }

      @media (min-width: 760px) {
        .scenario-roles[data-players="2"] {
          grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        }
        .scenario-roles[data-players="3"] {
          grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
        }
      }
      @media (min-width: 1024px) {
        .d2-main {
          grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr) !important;
        }
      }
    </style>
  </head>
  <body>
    <noscript>
      <div class="noscript-banner">Dust 2 Playbook requires JavaScript. Enable it to view scenarios and lineups.</div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
