<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Dust 2 Playbook — personal CS2 reference for multi-player executes, lineups, and team coordination." />
    <meta name="theme-color" content="#FAF9F6" />
    <meta name="color-scheme" content="light" />
    <meta name="application-name" content="Dust 2 Playbook" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Dust 2 Playbook" />
    <meta property="og:description" content="Multi-player executes and 4-card lineup walkthroughs for CS2 Dust 2." />
    <meta property="og:image" content="/cs2-utility-playbook/og-image.png" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.png" type="image/png" sizes="32x32" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>Dust 2 Playbook</title>
    <style>
      html, body, #root { margin: 0; padding: 0; min-height: 100vh; background: #FAF9F6; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        color: #1F1B16;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      * { box-sizing: border-box; }
      .noscript-banner {
        padding: 16px;
        background: #F4E1D2;
        border-bottom: 1px solid #C25A3A;
        color: #9C3C3C;
        text-align: center;
        font-size: 14px;
      }

      /* App layout — media queries live here because inline style={} doesn't support them */
      .app-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(300px, 40%);
        gap: 16px;
      }
      @media (max-width: 767px) {
        .app-grid { grid-template-columns: 1fr; }
      }

      /* 4-card walkthrough — 2x2 even on mobile (halved cards, NOT collapsed to 1x4) */
      .walkthrough-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      /* Skip link */
      .skip-link {
        position: absolute;
        left: -9999px;
        top: 8px;
        background: #FFFFFF;
        color: #1F1B16;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #E7E2D6;
      }
      .skip-link:focus { left: 8px; z-index: 1000; }
    </style>
  </head>
  <body>
    <noscript>
      <div class="noscript-banner">Dust 2 Playbook requires JavaScript. Enable it to view lineups.</div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
